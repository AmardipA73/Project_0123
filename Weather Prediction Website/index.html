<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Weather App</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>🌦️ Weather Prediction App</h1>

        <div class="search-box">

            <input type="text"
            id="city"
            placeholder="Enter City Name">

            <button onclick="getWeather()">
                Search
            </button>

        </div>

        <div class="weather-box">

            <h2 id="cityName">City Name</h2>

            <h1 id="temp">28°C</h1>

            <p id="weather">Sunny</p>

            <p id="humidity">Humidity: 60%</p>

            <p id="wind">Wind Speed: 12 km/h</p>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
